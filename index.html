<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>翘屁股计划</title>
  <style>
    :root {
      --bg: #f2fbf6;
      --card: #ffffff;
      --text: #1d2a21;
      --muted: #4b6356;
      --line: #cfe8db;
      --primary: #17b06c;
      --primary2: #10965b;
      --accent: #22d3ee;
      --accent2: #60a5fa;
      --danger: #b91c1c;
      --ok: #065f46;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "PingFang SC", "Noto Sans SC", "Helvetica Neue", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(900px 420px at 100% -20%, rgba(34, 197, 94, 0.2), transparent 60%),
        radial-gradient(760px 420px at 0% 0%, rgba(16, 185, 129, 0.16), transparent 62%),
        linear-gradient(180deg, #edf9f1 0%, var(--bg) 42%);
      padding-bottom: 92px;
    }

    .wrap { max-width: 980px; margin: 0 auto; padding: 14px; }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 12px;
      box-shadow: 0 8px 22px rgba(22, 101, 52, 0.09);
    }

    h1 { margin: 0 0 6px; font-size: 24px; }
    h2 { margin: 0 0 10px; font-size: 16px; }
    .muted { color: var(--muted); font-size: 13px; }
    #view-home .card { background: linear-gradient(180deg, #ffffff 0%, #f7fdf9 100%); }

    .hero-banner {
      position: relative;
      overflow: hidden;
      border-radius: 22px;
      padding: 18px;
      background:
        linear-gradient(145deg, rgba(29, 191, 115, 0.96) 0%, rgba(23, 176, 108, 0.92) 50%, rgba(11, 163, 95, 0.9) 100%);
      color: #fff;
      box-shadow: 0 18px 36px rgba(11, 163, 95, 0.28);
    }
    .hero-banner::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(260px 140px at 88% 8%, rgba(255, 255, 255, 0.28), transparent 74%),
        radial-gradient(220px 120px at 8% 92%, rgba(253, 224, 71, 0.18), transparent 74%);
      pointer-events: none;
    }
    .hero-inner {
      position: relative;
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 14px;
      align-items: center;
      z-index: 1;
    }
    .hero-banner h1 {
      margin: 0;
      font-size: 32px;
      letter-spacing: 1px;
      line-height: 1.12;
      text-shadow: 0 3px 10px rgba(0, 0, 0, 0.2);
    }
    .hero-subline {
      margin-top: 10px;
      font-size: 13px;
      opacity: 0.96;
      letter-spacing: 0.2px;
    }
    .hero-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 10px;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.42);
      background: rgba(255, 255, 255, 0.18);
      font-size: 12px;
      font-weight: 700;
      backdrop-filter: blur(8px);
    }
    .hero-art {
      min-height: 134px;
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.28);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.26), rgba(255, 255, 255, 0.1)),
        rgba(8, 122, 72, 0.2);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.4);
    }
    .hero-art svg {
      width: 92%;
      height: auto;
      max-height: 118px;
    }

    .grid { display: grid; gap: 10px; }
    .grid-2 { grid-template-columns: 1fr 1fr; }
    .grid-3 { grid-template-columns: 1fr 1fr 1fr; }

    label {
      display: block;
      font-size: 13px;
      margin-bottom: 5px;
      color: #374151;
    }

    input, select, textarea, button {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      font-size: 14px;
      background: #fff;
      color: #111827;
    }

    textarea { min-height: 82px; resize: vertical; }

    .btn {
      border: none;
      color: #fff;
      font-weight: 600;
      background: var(--primary);
      cursor: pointer;
    }
    .btn-secondary { background: var(--primary2); }
    .btn-danger { background: var(--danger); }

    .person-switch {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .person-btn {
      border: 1px solid var(--line);
      background: #f2fbf6;
      font-weight: 700;
      border-radius: 12px;
      padding: 12px;
      cursor: pointer;
      text-align: center;
    }
    .person-btn.active {
      background: linear-gradient(180deg, #18b56f 0%, #129a5d 100%);
      color: #fff;
      border-color: var(--primary);
    }

    .person-card-home {
      text-align: left;
      padding: 18px 16px;
      min-height: 132px;
      background: linear-gradient(180deg, #ffffff 0%, #f1fbf5 100%);
      box-shadow: 0 10px 22px rgba(21, 128, 61, 0.12);
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    }
    .person-card-home:active {
      transform: scale(0.985);
    }
    .person-card-home.active {
      background: linear-gradient(180deg, #18b56f 0%, #10965b 100%);
      box-shadow: 0 14px 28px rgba(16, 150, 91, 0.3);
    }
    .person-name {
      font-size: 21px;
      font-weight: 800;
      margin-bottom: 10px;
      letter-spacing: 0.3px;
    }
    .person-meta {
      font-size: 13px;
      opacity: 0.92;
      line-height: 1.45;
    }

    .badge {
      display: inline-block;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 700;
      margin-left: 6px;
    }
    .badge-ok { background: #dcfce7; color: #14532d; }
    .badge-no { background: #fee2e2; color: #7f1d1d; }

    .view { display: none; }
    .view.active { display: block; }

    .top-row {
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
    }
    .current-person {
      font-size: 14px;
      color: #0f8a52;
      font-weight: 700;
    }

    .scroll {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    table {
      border-collapse: collapse;
      min-width: 900px;
      width: 100%;
      font-size: 13px;
      background: #fff;
    }
    th, td {
      border: 1px solid var(--line);
      padding: 8px 6px;
      text-align: center;
      vertical-align: middle;
    }
    th { background: #f9fafb; font-weight: 700; }
    td input { min-width: 74px; padding: 7px 6px; font-size: 13px; border-radius: 8px; }
    td .narrow { min-width: 56px; }
    .left { text-align: left; }

    .ok {
      color: var(--ok);
      font-size: 13px;
      margin-top: 8px;
      min-height: 18px;
    }

    .history-box {
      border: 1px dashed #8ec5a9;
      border-radius: 10px;
      padding: 10px;
      margin-top: 10px;
      background: #f5fcf8;
    }

    .small-btn {
      width: auto;
      padding: 6px 10px;
      font-size: 12px;
      border-radius: 8px;
      margin-right: 6px;
      border: 0;
      color: #fff;
      cursor: pointer;
      background: #129a5d;
    }
    .small-btn.danger { background: var(--danger); }

    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 76px;
      background: rgba(255, 255, 255, 0.96);
      border-top: 1px solid #e5e7eb;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      z-index: 999;
      backdrop-filter: saturate(180%) blur(8px);
    }
    .nav-btn {
      border: 0;
      background: transparent;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      color: #4b5563;
      font-size: 12px;
      cursor: pointer;
    }
    .nav-btn .icon {
      font-size: 18px;
      line-height: 1;
    }
    .nav-btn.active {
      color: #10965b;
      font-weight: 700;
    }

    @media (max-width: 720px) {
      .grid-2, .grid-3 { grid-template-columns: 1fr; }
      h1 { font-size: 21px; }
      .hero-inner { grid-template-columns: 1fr; }
      .hero-banner h1 { font-size: 28px; }
      .hero-art { min-height: 110px; }
      .person-card-home { min-height: 124px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="hero-banner">
        <div class="hero-inner">
          <div>
            <h1>翘屁股计划</h1>
            <div class="hero-subline">训练打卡 · 双人记录 · 进度对比</div>
          </div>
          <div class="hero-art" aria-hidden="true">
            <svg viewBox="0 0 320 160" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
                  <stop offset="0%" stop-color="rgba(255,255,255,0.9)"/>
                  <stop offset="100%" stop-color="rgba(220,252,231,0.78)"/>
                </linearGradient>
              </defs>
              <rect x="12" y="46" width="296" height="94" rx="24" fill="rgba(6,95,70,0.24)"/>
              <rect x="22" y="58" width="276" height="72" rx="16" fill="url(#panel)"/>
              <rect x="34" y="106" width="252" height="12" rx="6" fill="rgba(16,185,129,0.2)"/>

              <circle cx="88" cy="74" r="10" fill="rgba(15,118,110,0.92)"/>
              <path d="M88 84 L88 103" stroke="rgba(15,118,110,0.92)" stroke-width="7" stroke-linecap="round"/>
              <path d="M88 90 L68 98" stroke="rgba(15,118,110,0.92)" stroke-width="6" stroke-linecap="round"/>
              <path d="M88 90 L108 98" stroke="rgba(15,118,110,0.92)" stroke-width="6" stroke-linecap="round"/>
              <path d="M88 103 L76 121" stroke="rgba(15,118,110,0.92)" stroke-width="6" stroke-linecap="round"/>
              <path d="M88 103 L102 121" stroke="rgba(15,118,110,0.92)" stroke-width="6" stroke-linecap="round"/>

              <rect x="114" y="68" width="84" height="10" rx="5" fill="rgba(16,185,129,0.95)"/>
              <rect x="104" y="64" width="10" height="18" rx="3" fill="rgba(5,150,105,0.95)"/>
              <rect x="198" y="64" width="10" height="18" rx="3" fill="rgba(5,150,105,0.95)"/>

              <rect x="224" y="70" width="50" height="8" rx="4" fill="rgba(15,118,110,0.86)"/>
              <rect x="216" y="66" width="8" height="16" rx="2" fill="rgba(15,118,110,0.86)"/>
              <rect x="274" y="66" width="8" height="16" rx="2" fill="rgba(15,118,110,0.86)"/>
              <rect x="210" y="62" width="6" height="24" rx="2" fill="rgba(13,148,136,0.92)"/>
              <rect x="282" y="62" width="6" height="24" rx="2" fill="rgba(13,148,136,0.92)"/>

              <circle cx="252" cy="38" r="18" fill="rgba(253,224,71,0.92)"/>
              <path d="M242 38h20" stroke="rgba(22,101,52,0.86)" stroke-width="5" stroke-linecap="round"/>
              <path d="M252 28v20" stroke="rgba(22,101,52,0.86)" stroke-width="5" stroke-linecap="round"/>
            </svg>
          </div>
        </div>
      </div>
    </div>

    <div id="view-home" class="view active">
      <div class="card">
        <h2>首页打卡</h2>
        <div class="grid grid-3">
          <div>
            <label for="trainDate">日期</label>
            <input id="trainDate" type="date">
          </div>
          <div>
            <label for="sessionTheme">训练主题</label>
            <select id="sessionTheme">
              <option value="减脂塑形周">减脂塑形周</option>
              <option value="翘臀强化周">翘臀强化周</option>
              <option value="恢复减量周">恢复减量周</option>
              <option value="自定义">自定义</option>
            </select>
          </div>
          <div id="customThemeWrap" style="display:none;">
            <label for="customTheme">自定义主题</label>
            <input id="customTheme" type="text" placeholder="例如：第3周冲刺">
          </div>
        </div>
      </div>

      <div class="card">
        <h2>切换训练者</h2>
        <div class="person-switch">
          <button id="home-person-a" class="person-btn person-card-home active" type="button">
            <div class="person-name">妞妞</div>
            <div id="home-status-a" class="person-meta">今日未打卡</div>
          </button>
          <button id="home-person-b" class="person-btn person-card-home" type="button">
            <div class="person-name">牛牛</div>
            <div id="home-status-b" class="person-meta">今日未打卡</div>
          </button>
        </div>
        <div style="margin-top:10px;" id="home-summary" class="muted"></div>
        <div style="margin-top:12px;" class="grid grid-2">
          <button class="btn" id="gotoRecordBtn" type="button">开始记录</button>
        </div>
      </div>
    </div>

    <div id="view-record" class="view">
      <div class="card">
        <div class="top-row">
          <h2 style="margin:0;">训练记录</h2>
          <div class="current-person" id="currentPersonLabel">当前：妞妞</div>
        </div>
        <div class="grid grid-3" style="margin-top:10px;">
          <div>
            <label for="recordPersonSelect">姓名</label>
            <select id="recordPersonSelect">
              <option value="a">妞妞</option>
              <option value="b">牛牛</option>
            </select>
          </div>
          <div>
            <label for="recordTrainingType">训练类型</label>
            <select id="recordTrainingType">
              <option value="上肢B（拉）">上肢B（拉）</option>
              <option value="上肢A（推）">上肢A（推）</option>
              <option value="腿1（臀主导）">腿1（臀主导）</option>
              <option value="腿2（臀腿）">腿2（臀腿）</option>
              <option value="有氧+核心">有氧+核心</option>
            </select>
          </div>
          <div>
            <label for="recordDuration">训练时长（分钟）</label>
            <select id="recordDuration">
              <option value="">请选择</option>
              <option value="30">30</option>
              <option value="40">40</option>
              <option value="45">45</option>
              <option value="50">50</option>
              <option value="60">60</option>
              <option value="75">75</option>
              <option value="90">90</option>
            </select>
          </div>
        </div>
        <div class="grid grid-3" style="margin-top:10px;">
          <div><label for="recordMorningWeight">空腹体重（kg）</label><input id="recordMorningWeight" type="number" step="0.1"></div>
        </div>
      </div>

      <div class="card">
        <h2>力量记录（随训练类型变化）</h2>
        <div class="scroll">
          <table>
            <thead>
              <tr>
                <th>动作（可编辑）</th><th>组次（可编辑）</th><th>目标次数/时长（可编辑）</th><th>计划重量<br>kg(lb)（可编辑）</th>
                <th>实际重量<br>kg</th><th>实际次数/时长</th><th>RPE</th><th>备注</th>
              </tr>
            </thead>
            <tbody id="recordRows"></tbody>
          </table>
        </div>
      </div>

      <div class="card">
        <h2>补充记录</h2>
        <div class="grid grid-2">
          <div><label for="recordCardio">有氧记录</label><textarea id="recordCardio"></textarea></div>
        </div>
        <div style="margin-top:10px;"><label for="recordFeeling">主观感受</label><textarea id="recordFeeling"></textarea></div>
        <div style="margin-top:10px;" class="grid grid-3">
          <button class="btn btn-secondary" id="saveHistoryBtn" type="button">保存记录（加入对比）</button>
          <button class="btn btn-secondary" id="copyCurrentBtn" type="button">复制当前训练者记录</button>
        </div>
        <div id="recordMsg" class="ok"></div>
      </div>
    </div>

    <div id="view-history" class="view">
      <div class="card">
        <h2>历史记录与对比</h2>
        <div class="grid grid-3">
          <button class="btn btn-secondary" id="copyBothBtn" type="button">复制双人汇总文本</button>
          <button class="btn btn-secondary" id="downloadTxtBtn" type="button">下载双人 TXT</button>
          <button class="btn btn-secondary" id="downloadJsonBtn" type="button">下载全部 JSON（含历史）</button>
          <button class="btn btn-secondary" id="importJsonBtn" type="button">导入 JSON 恢复记录</button>
          <button class="btn btn-secondary" id="refreshHistoryBtn" type="button">刷新历史列表</button>
          <button class="btn btn-danger" id="resetBtn" type="button">清空当前页</button>
        </div>
        <input id="importJsonInput" type="file" accept=".json,application/json" style="display:none;">
        <div id="msg" class="ok"></div>
      </div>

      <div class="card">
        <div class="grid grid-3">
          <div>
            <label for="comparePerson">对比对象</label>
            <select id="comparePerson">
              <option value="a">妞妞</option>
              <option value="b">牛牛</option>
            </select>
          </div>
          <div>
            <label for="compareDate1">日期A</label>
            <select id="compareDate1"></select>
          </div>
          <div>
            <label for="compareDate2">日期B</label>
            <select id="compareDate2"></select>
          </div>
        </div>
        <div style="margin-top:10px;" class="grid grid-2">
          <button class="btn btn-secondary" id="compareBtn" type="button">生成日期对比</button>
        </div>
        <div id="compareResult" class="history-box"></div>
        <div id="historyList" class="history-box"></div>
      </div>
    </div>
  </div>

  <nav class="bottom-nav">
    <button class="nav-btn active" data-view="home" type="button"><span class="icon">⌂</span><span>首页</span></button>
    <button class="nav-btn" data-view="record" type="button"><span class="icon">✎</span><span>记录</span></button>
    <button class="nav-btn" data-view="history" type="button"><span class="icon">◷</span><span>对比</span></button>
  </nav>

  <script>
    var DRAFT_KEY = "qiaopigu_plan_draft_v2";
    var HISTORY_KEY = "qiaopigu_plan_history_v2";
    var memoryStore = { draft: null, history: [] };
    var localStorageOK = true;

    var activeView = "home";
    var activePersonId = "a";
    var autoSaveTimer = null;

    var templates = {
      "上肢B（拉）": [

      ],
      "腿2（臀腿）": [

    var app = {

      people: {

    function defaultPerson(name) {
      return {
        name: name,
        trainingType: "上肢B（拉）",
        duration: "",
        morningWeight: "",
        rowsByType: {},
        cardio: "",
        feeling: ""
      };

    function todayStr() {
      var d = new Date();
      var y = d.getFullYear();
      var m = String(d.getMonth() + 1).padStart(2, "0");
      var day = String(d.getDate()).padStart(2, "0");
      return y + "-" + m + "-" + day;
    }

    function esc(s) {
      if (s === null || s === undefined) return "";
      return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    }

    function getHistory() {
      if (!localStorageOK) return Array.isArray(memoryStore.history) ? memoryStore.history : [];
      try {
        var raw = localStorage.getItem(HISTORY_KEY);
        if (!raw) return [];
        var arr = JSON.parse(raw);
        return Array.isArray(arr) ? arr : [];
      } catch (e) {
        return Array.isArray(memoryStore.history) ? memoryStore.history : [];
      }
    }

    function saveHistory(list) {
      memoryStore.history = Array.isArray(list) ? list : [];
      if (!localStorageOK) return;
      try { localStorage.setItem(HISTORY_KEY, JSON.stringify(list)); } catch (e) {}
    }

    function saveDraft() {
      syncRecordFormToState();
      memoryStore.draft = { app: app, activePersonId: activePersonId };

        if (localStorageOK) localStorage.setItem(DRAFT_KEY, JSON.stringify({ app: app, activePersonId: activePersonId }));

        return true;
      }
      try {
        var raw = localStorage.getItem(DRAFT_KEY);

        if (d && d.app) {
          app = d.app;
          activePersonId = d.activePersonId === "b" ? "b" : "a";

        }

    function setView(v) {
      if (activeView === "record") syncRecordFormToState();
      activeView = v;

      for (var i = 0; i < views.length; i++) {
        var id = views[i];

        if (el) el.classList.toggle("active", id === v);
      }

    function setActivePerson(pid) {

    function toggleCustomTheme() {
      var wrap = document.getElementById("customThemeWrap");
      wrap.style.display = document.getElementById("sessionTheme").value === "自定义" ? "block" : "none";
    }

    function buildRecordRows(person, preloadRows) {
      var tbody = document.getElementById("recordRows");
      var tpl = templates[person.trainingType] || [];
      tbody.innerHTML = "";
      for (var i = 0; i < tpl.length; i++) {
        var t = tpl[i];
        var s = preloadRows && preloadRows[i] ? preloadRows[i] : null;
        var actionVal = (s && s.action !== undefined && s.action !== null && s.action !== "") ? s.action : t[0];
        var setVal = (s && s.set !== undefined && s.set !== null && s.set !== "") ? s.set : t[1];
        var targetVal = (s && s.targetRep !== undefined && s.targetRep !== null && s.targetRep !== "") ? s.targetRep : t[2];
        var planVal = (s && s.planWeight !== undefined && s.planWeight !== null && s.planWeight !== "") ? s.planWeight : t[3];
        var tr = document.createElement("tr");
        tr.innerHTML =
          "<td><input id='row-a-" + i + "' value='" + esc(actionVal) + "'></td>" +
          "<td><input id='row-s-" + i + "' class='narrow' value='" + esc(setVal) + "'></td>" +
          "<td><input id='row-t-" + i + "' class='narrow' value='" + esc(targetVal) + "'></td>" +
          "<td><input id='row-pl-" + i + "' class='narrow' value='" + esc(planVal) + "'></td>" +
          "<td><input id='row-w-" + i + "' class='narrow' inputmode='decimal' value='" + esc(s ? s.actualWeightKg : "") + "'></td>" +
          "<td><input id='row-r-" + i + "' class='narrow' value='" + esc(s ? s.actualRep : "") + "'></td>" +
          "<td><input id='row-p-" + i + "' class='narrow' inputmode='decimal' value='" + esc(s ? s.rpe : "") + "'></td>" +
          "<td><input id='row-n-" + i + "' value='" + esc(s ? s.note : "") + "'></td>";
        tbody.appendChild(tr);
      }
    }

    function collectRowsForPerson(person) {
      var tpl = templates[person.trainingType] || [];
      var rows = [];
      for (var i = 0; i < tpl.length; i++) {
        rows.push({
          action: val("row-a-" + i) || tpl[i][0],
          set: val("row-s-" + i) || tpl[i][1],
          targetRep: val("row-t-" + i) || tpl[i][2],
          planWeight: val("row-pl-" + i) || tpl[i][3],
          actualWeightKg: val("row-w-" + i),
          actualRep: val("row-r-" + i),
          rpe: val("row-p-" + i),
          note: val("row-n-" + i)
        });
      }
      return rows;
    }

    function syncGlobalToState() {
      app.date = val("trainDate") || todayStr();
      app.themeSelect = val("sessionTheme") || "减脂塑形周";
      app.customTheme = val("customTheme");
    }

    function syncRecordFormToState() {
      if (activeView !== "record") return;
      syncGlobalToState();
      var p = app.people[activePersonId];
      var oldType = p.trainingType;
      p.rowsByType[oldType] = collectRowsForPerson(p);
      p.trainingType = val("recordTrainingType") || oldType;
      p.duration = val("recordDuration");
      p.morningWeight = val("recordMorningWeight");
      p.cardio = val("recordCardio");
      p.feeling = val("recordFeeling");

      if (p.trainingType !== oldType) {
        var newRows = p.rowsByType[p.trainingType] || [];
        p.rowsByType[p.trainingType] = newRows;
      }
    }

    function renderRecordView() {
      syncGlobalToDom();
      var p = app.people[activePersonId];
      text("currentPersonLabel", "当前：" + p.name);
      set("recordPersonSelect", activePersonId);
      set("recordTrainingType", p.trainingType);
      set("recordDuration", p.duration);
      set("recordMorningWeight", p.morningWeight);
      set("recordCardio", p.cardio);
      set("recordFeeling", p.feeling);
      buildRecordRows(p, p.rowsByType[p.trainingType] || []);
    }

    function syncGlobalToDom() {
      set("trainDate", app.date || todayStr());
      set("sessionTheme", app.themeSelect || "减脂塑形周");
      set("customTheme", app.customTheme || "");
      toggleCustomTheme();
    }

    function hasCheckIn(person) {
      if (!person) return false;
      if (person.morningWeight || person.duration || person.cardio || person.feeling) return true;
      var rows = person.rowsByType && person.rowsByType[person.trainingType] ? person.rowsByType[person.trainingType] : [];
      for (var i = 0; i < rows.length; i++) {
        if (rows[i].actualWeightKg || rows[i].actualRep || rows[i].rpe) return true;
      }
      return false;
    }

    function findHistoryByDate(date) {
      var h = getHistory();
      for (var i = 0; i < h.length; i++) {
        if (h[i].date === date) return h[i];
      }
      return null;
    }

    function renderHomeStatus() {
      syncGlobalToState();
      var day = findHistoryByDate(app.date);
      var pa = day ? day.people.a : app.people.a;
      var pb = day ? day.people.b : app.people.b;
      var doneA = hasCheckIn(pa);
      var doneB = hasCheckIn(pb);
      var statusA = (doneA ? "今日已打卡" : "今日未打卡") + " ｜ 晨重 " + (pa.morningWeight || "-") + "kg";
      var statusB = (doneB ? "今日已打卡" : "今日未打卡") + " ｜ 晨重 " + (pb.morningWeight || "-") + "kg";

      text("home-status-a", statusA);
      text("home-status-b", statusB);
      text("home-summary", "日期：" + app.date + " ｜ 主题：" + getThemeText() + " ｜ 当前选择：" + app.people[activePersonId].name);
    }

    function getThemeText() {
      if (app.themeSelect === "自定义") return app.customTheme || "自定义";
      return app.themeSelect || "减脂塑形周";
    }

    function mergeHistoryByDate(arr) {
      var map = {};
      for (var i = 0; i < arr.length; i++) {
        var item = arr[i];
        if (!item || !item.date) continue;
        map[item.date] = item;
      }
      var out = [];
      for (var k in map) out.push(map[k]);
      out.sort(function(a, b){ return a.date < b.date ? 1 : -1; });
      return out;
    }

    function saveToHistory() {
      syncRecordFormToState();
      syncGlobalToState();
      var payload = cloneApp();

      var history = getHistory();
      history.push(payload);
      history = mergeHistoryByDate(history);
      saveHistory(history);
      renderHomeStatus();
      renderHistory();
      showMsg("已保存到历史，共 " + history.length + " 条。可在对比页查看。");
    }

    function cloneApp() {
      return JSON.parse(JSON.stringify(app));
    }

    function renderHistory() {
      var history = getHistory();
      var box = document.getElementById("historyList");
      var sel1 = document.getElementById("compareDate1");
      var sel2 = document.getElementById("compareDate2");
      sel1.innerHTML = "";
      sel2.innerHTML = "";

      if (!history.length) {
        box.innerHTML = "暂无历史记录。先去记录页保存“按日期历史”。";
        return;
      }

      var html = ["<div><strong>历史列表</strong></div><div style='margin-top:8px;'>"];
      for (var i = 0; i < history.length; i++) {
        var item = history[i];
        var aW = item.people && item.people.a ? (item.people.a.morningWeight || "-") : "-";
        var bW = item.people && item.people.b ? (item.people.b.morningWeight || "-") : "-";

        sel1.appendChild(opt(item.date));
        sel2.appendChild(opt(item.date));

        html.push(
          "<div style='padding:8px;border-bottom:1px solid #e5e7eb;'>" +
          "<div><strong>" + esc(item.date) + "</strong>｜主题：" + esc(getThemeTextBy(item)) + "｜妞妞晨重：" + esc(aW) + "kg｜牛牛晨重：" + esc(bW) + "kg</div>" +
          "<div style='margin-top:6px;'>" +
          "<button class='small-btn' type='button' onclick='loadHistoryByDate(\"" + escAttr(item.date) + "\")'>加载这天</button>" +
          "<button class='small-btn' type='button' onclick='showDetailByDate(\"" + escAttr(item.date) + "\")'>查看详情</button>" +
          "<button class='small-btn danger' type='button' onclick='deleteHistoryByDate(\"" + escAttr(item.date) + "\")'>删除</button>" +
          "</div></div>"
        );
      }
      html.push("</div><div id='historyDetail' style='margin-top:10px;white-space:pre-wrap;'></div>");
      box.innerHTML = html.join("");

      if (history.length >= 2) {
        sel1.value = history[1].date;
        sel2.value = history[0].date;
      } else {
        sel1.value = history[0].date;
        sel2.value = history[0].date;
      }
    }

    function getThemeTextBy(day) {
      if (!day) return "-";
      if (day.themeSelect === "自定义") return day.customTheme || "自定义";
      return day.themeSelect || "-";
    }

    function opt(v) {
      var o = document.createElement("option");
      o.value = v;
      o.textContent = v;
      return o;
    }

    function escAttr(s) {
      if (s === null || s === undefined) return "";
      return String(s).replace(/\\/g, "\\\\").replace(/"/g, "\\\"");
    }

    function loadHistoryByDate(d) {
      var history = getHistory();
      for (var i = 0; i < history.length; i++) {
        if (history[i].date === d) {
          app = history[i];
          syncGlobalToDom();
          renderHomeStatus();
          if (activeView === "record") renderRecordView();
          saveDraft();
          showMsg("已加载 " + d + " 的记录。");
          return;
        }
      }
    }

    function deleteHistoryByDate(d) {
      if (!confirm("确认删除 " + d + " 的历史记录？")) return;
      var history = getHistory();
      var next = [];
      for (var i = 0; i < history.length; i++) if (history[i].date !== d) next.push(history[i]);
      saveHistory(next);
      renderHistory();
      renderHomeStatus();
      showMsg("已删除 " + d + "。");
    }

    function showDetailByDate(d) {
      var history = getHistory();
      for (var i = 0; i < history.length; i++) {
        if (history[i].date === d) {
          var el = document.getElementById("historyDetail");
          if (el) el.textContent = buildSummary(history[i], "both");
          return;
        }
      }
    }

    function parseNum(v) {
      var n = parseFloat(v);
      return isNaN(n) ? null : n;
    }

    function bestPerAction(rowsByType, trainingType) {
      var rows = rowsByType && rowsByType[trainingType] ? rowsByType[trainingType] : [];
      var map = {};
      for (var i = 0; i < rows.length; i++) {
        var r = rows[i];
        var k = r.action;
        var w = parseNum(r.actualWeightKg);
        var rep = parseNum(r.actualRep);
        if (!map[k]) map[k] = { weight: w, rep: rep, text: (r.actualWeightKg || "-") + "kg x " + (r.actualRep || "-") };
        else {
          var oldW = map[k].weight;
          if (w !== null && (oldW === null || w > oldW)) {
            map[k] = { weight: w, rep: rep, text: (r.actualWeightKg || "-") + "kg x " + (r.actualRep || "-") };
          }
        }
      }
      return map;
    }

    function compareDates() {
      var person = val("comparePerson");
      var d1 = val("compareDate1");
      var d2 = val("compareDate2");
      var out = document.getElementById("compareResult");
      var history = getHistory();
      var a = null, b = null;
      for (var i = 0; i < history.length; i++) {
        if (history[i].date === d1) a = history[i];
        if (history[i].date === d2) b = history[i];
      }
      if (!a || !b) {
        out.textContent = "请选择两个有效日期。";
        return;
      }

      var p1 = a.people[person];
      var p2 = b.people[person];
      var w1 = parseNum(p1.morningWeight);
      var w2 = parseNum(p2.morningWeight);
      var wDelta = (w1 !== null && w2 !== null) ? (w2 - w1).toFixed(1) : "-";

      var m1 = bestPerAction(p1.rowsByType, p1.trainingType);
      var m2 = bestPerAction(p2.rowsByType, p2.trainingType);
      var keys = {};
      var k;
      for (k in m1) keys[k] = true;
      for (k in m2) keys[k] = true;

      var html = [];
      html.push("<div><strong>对比结果（" + (person === "a" ? "妞妞" : "牛牛") + "）</strong></div>");
      html.push("<div style='margin-top:6px;'>日期A：" + d1 + " ｜ 日期B：" + d2 + "</div>");
      html.push("<div style='margin-top:6px;'>晨重变化：" + (wDelta === "-" ? "-" : (wDelta > 0 ? "+" + wDelta : wDelta)) + " kg</div>");
      html.push("<div style='margin-top:8px;' class='scroll'><table><thead><tr><th>动作</th><th>A最好表现</th><th>B最好表现</th><th>重量变化(kg)</th></tr></thead><tbody>");
      for (k in keys) {
        var x = m1[k] || { text: "-", weight: null };
        var y = m2[k] || { text: "-", weight: null };
        var dlt = "-";
        if (x.weight !== null && y.weight !== null) {
          var v = (y.weight - x.weight).toFixed(1);
          dlt = (parseFloat(v) > 0 ? "+" : "") + v;
        }
        html.push("<tr><td class='left'>" + esc(k) + "</td><td>" + esc(x.text) + "</td><td>" + esc(y.text) + "</td><td>" + esc(dlt) + "</td></tr>");
      }
      html.push("</tbody></table></div>");
      out.innerHTML = html.join("");
    }

    function buildSummary(data, mode) {
      var d = data || app;
      var lines = [];
      lines.push("翘屁股计划｜" + (d.date || "") + "｜主题：" + (getThemeTextBy(d) || "-"));

      function one(p) {
        lines.push("");
        lines.push("【" + p.name + "】训练类型：" + (p.trainingType || "-") + "｜时长：" + (p.duration || "-") + "分钟｜空腹体重：" + (p.morningWeight || "-") + "kg");
        var rows = p.rowsByType && p.rowsByType[p.trainingType] ? p.rowsByType[p.trainingType] : [];
        lines.push("力量记录：");
        for (var i = 0; i < rows.length; i++) {
          var r = rows[i];
          var note = r.note ? (" 备注:" + r.note) : "";
          lines.push("- " + r.action + " 第" + r.set + "组（计划" + r.planWeight + "）=> " + (r.actualWeightKg || "-") + "kg x " + (r.actualRep || "-") + "，RPE " + (r.rpe || "-") + note);
        }
        lines.push("有氧：" + (p.cardio || "-"));
        lines.push("感受：" + (p.feeling || "-"));
      }

      if (mode === "a") one(d.people.a);
      else if (mode === "b") one(d.people.b);
      else { one(d.people.a); one(d.people.b); }
      return lines.join("\n");
    }

    function importJsonText(text) {
      var parsed = JSON.parse(text);
      if (parsed && parsed.app && parsed.history && Array.isArray(parsed.history)) {
        app = parsed.app;
        saveHistory(mergeHistoryByDate(parsed.history));
        syncGlobalToDom();
        renderHomeStatus();
        if (activeView === "record") renderRecordView();
        renderHistory();
        saveDraft();
        showMsg("已导入：当前记录 + 历史记录。");
        return;
      }
      if (Array.isArray(parsed)) {
        var mergedArr = mergeHistoryByDate(parsed);
        saveHistory(mergedArr);
        if (mergedArr.length) app = mergedArr[0];
        syncGlobalToDom();
        renderHomeStatus();
        if (activeView === "record") renderRecordView();
        renderHistory();
        saveDraft();
        showMsg("已导入：历史记录。");
        return;
      }
      if (parsed && parsed.date && parsed.people) {
        var h = getHistory();
        h.push(parsed);
        saveHistory(mergeHistoryByDate(h));
        app = parsed;
        syncGlobalToDom();
        renderHomeStatus();
        if (activeView === "record") renderRecordView();
        renderHistory();
        saveDraft();
        showMsg("已导入：单日记录。");
        return;
      }
      throw new Error("unsupported_json");
    }

    function showMsg(msg) {
      var ids = ["msg", "recordMsg"];
      for (var i = 0; i < ids.length; i++) {
        var el = document.getElementById(ids[i]);
        if (!el) continue;
        el.textContent = msg;
        (function(target, text){
          setTimeout(function(){ if (target.textContent === text) target.textContent = ""; }, 2400);
        })(el, msg);
      }
    }

    function autoSaveDraftSilently() {
      if (activeView === "record") syncRecordFormToState();
      syncGlobalToState();
      try {
        localStorage.setItem(DRAFT_KEY, JSON.stringify({ app: app, activePersonId: activePersonId }));
      } catch (e) {}
    }

    function scheduleAutoSave() {
      if (autoSaveTimer) clearTimeout(autoSaveTimer);
      autoSaveTimer = setTimeout(autoSaveDraftSilently, 500);
    }

    function copyText(text, okMsg) {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(function(){
          showMsg(okMsg);
        }).catch(function(){
          window.prompt("自动复制失败，请手动全选复制下面内容：", text);
          showMsg("复制受限，已弹出手动复制窗口。");
        });
        return;
      }
      window.prompt("当前环境不支持自动复制，请手动全选复制下面内容：", text);
      showMsg("当前环境不支持自动复制，已弹出手动复制窗口。");
    }

    function downloadFile(name, content, mime) {
      var blob = new Blob([content], { type: mime });
      var url = URL.createObjectURL(blob);
      var a = document.createElement("a");
      a.href = url;
      a.download = name;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    function resetCurrentPage() {
      if (!confirm("确认清空当前页数据？")) return;
      app.people[activePersonId] = defaultPerson(activePersonId === "a" ? "妞妞" : "牛牛");
      renderRecordView();
      renderHomeStatus();
      showMsg("已清空当前训练者页面数据。");
    }

    function val(id) {
      var el = document.getElementById(id);
      return el ? el.value.trim() : "";
    }

    function set(id, v) {
      var el = document.getElementById(id);
      if (el) el.value = v || "";
    }

    function text(id, t) {
      var el = document.getElementById(id);
      if (el) el.textContent = t;
    }

    function bind() {
      var navBtns = document.querySelectorAll(".nav-btn");
      for (var i = 0; i < navBtns.length; i++) {
        navBtns[i].addEventListener("click", function(){ setView(this.getAttribute("data-view")); });
      }

      document.getElementById("home-person-a").addEventListener("click", function(){ setActivePerson("a"); });
      document.getElementById("home-person-b").addEventListener("click", function(){ setActivePerson("b"); });
      document.getElementById("gotoRecordBtn").addEventListener("click", function(){ setView("record"); });

      document.getElementById("sessionTheme").addEventListener("change", function(){
        syncGlobalToState();
        toggleCustomTheme();
        renderHomeStatus();
        scheduleAutoSave();
      });
      document.getElementById("customTheme").addEventListener("input", function(){
        syncGlobalToState();
        renderHomeStatus();
        scheduleAutoSave();
      });
      document.getElementById("trainDate").addEventListener("change", function(){
        syncGlobalToState();
        renderHomeStatus();
        scheduleAutoSave();
      });

      document.getElementById("recordTrainingType").addEventListener("change", function(){
        var p = app.people[activePersonId];
        p.rowsByType[p.trainingType] = collectRowsForPerson(p);
        p.trainingType = val("recordTrainingType") || p.trainingType;
        buildRecordRows(p, p.rowsByType[p.trainingType] || []);
        scheduleAutoSave();
      });

      document.getElementById("recordPersonSelect").addEventListener("change", function(){
        var next = val("recordPersonSelect");
        if (next !== "a" && next !== "b") return;
        syncRecordFormToState();
        setActivePerson(next);
        if (activeView !== "record") setView("record");
        scheduleAutoSave();
      });

      document.getElementById("saveHistoryBtn").addEventListener("click", saveToHistory);
      document.getElementById("copyCurrentBtn").addEventListener("click", function(){
        syncRecordFormToState();
        copyText(buildSummary(app, activePersonId), "已复制当前训练者记录。");
      });

      document.getElementById("copyBothBtn").addEventListener("click", function(){
        syncRecordFormToState();
        copyText(buildSummary(app, "both"), "已复制双人汇总。\n");
      });

      document.getElementById("downloadTxtBtn").addEventListener("click", function(){
        syncRecordFormToState();
        downloadFile("qiaopigu-" + (app.date || todayStr()) + ".txt", buildSummary(app, "both"), "text/plain;charset=utf-8");
        showMsg("已下载 TXT。");
      });

      document.getElementById("downloadJsonBtn").addEventListener("click", function(){
        syncRecordFormToState();
        var pack = {
          version: "qiaopigu-v2",
          exportedAt: new Date().toISOString(),
          app: app,
          history: getHistory()
        };
        downloadFile("qiaopigu-all-" + (app.date || todayStr()) + ".json", JSON.stringify(pack, null, 2), "application/json");
        showMsg("已下载全部 JSON（含历史）。");
      });

      document.getElementById("importJsonBtn").addEventListener("click", function(){ document.getElementById("importJsonInput").click(); });
      document.getElementById("importJsonInput").addEventListener("change", function(e){
        var f = e.target.files && e.target.files[0];
        if (!f) return;
        var reader = new FileReader();
        reader.onload = function(ev) {
          try {
            importJsonText(String(ev.target.result || ""));
          } catch (err) {
            showMsg("导入失败：请确认是本页面导出的JSON。");
          }
          e.target.value = "";
        };
        reader.readAsText(f, "utf-8");
      });

      document.getElementById("refreshHistoryBtn").addEventListener("click", renderHistory);
      document.getElementById("compareBtn").addEventListener("click", compareDates);
      document.getElementById("resetBtn").addEventListener("click", resetCurrentPage);

      document.addEventListener("input", function(e){
        if (e.target && (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA")) scheduleAutoSave();
      });
      document.addEventListener("change", function(e){
        if (e.target && e.target.tagName === "SELECT") scheduleAutoSave();
      });
    }

    function init() {
      try {
        var k = "__qiaopigu_test__";
        localStorage.setItem(k, "1");
        localStorage.removeItem(k);
        localStorageOK = true;
      } catch (e) {
        localStorageOK = false;
      }

      app.date = todayStr();
      syncGlobalToDom();
      var loaded = loadDraft();
      if (!loaded) {
        app.people.a.rowsByType[app.people.a.trainingType] = [];
        app.people.b.rowsByType[app.people.b.trainingType] = [];
      }
      syncGlobalToDom();
      setActivePerson(activePersonId);
      bind();
      renderRecordView();
      renderHomeStatus();
      renderHistory();
      setView("home");
      if (!localStorageOK) showMsg("当前为受限模式：仅本次会话可保存，建议用线上链接使用。");
    }

    init();
  </script>
</body>
</html>
